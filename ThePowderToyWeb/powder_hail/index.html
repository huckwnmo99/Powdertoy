<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powder Hail - Chemical Sandbox</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background-color: #000;
            border: 2px solid #555;
            image-rendering: pixelated;
            cursor: crosshair;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 800px;
        }
        .panel {
            background-color: #222;
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }
        button {
            padding: 8px 16px;
            background-color: #333;
            color: white;
            border: 1px solid #666;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover { background-color: #444; }
        button.active { background-color: #4CAF50; border-color: #81c784; }
        label { cursor: pointer; }
    </style>
</head>
<body>
    <h1>Powder Hail (화학 공정 시뮬레이터)</h1>
    <p>T: 온도 보기, P: 압력 보기, V: 바람 보기 | 마우스를 올려 수치를 확인하세요.</p>
    
    <div style="position: relative;">
        <!-- HUD Overlay -->
        <div id="hud" style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-family: monospace; pointer-events: none; border: 1px solid #444; min-width: 150px; line-height: 1.4;">
            <div style="color: #4CAF50;">Element: <span id="hudName">-</span></div>
            <div style="color: #ff5722;">Temp: <span id="hudTemp">0</span>°C</div>
            <div style="color: #2196f3;">Pres: <span id="hudPres">0</span></div>
        </div>
        <canvas id="simCanvas" width="280" height="280" style="width: 700px; height: 700px;"></canvas>
    </div>

    <!-- 파이프 및 도구 설정 패널 -->
    <div class="panel">
        <div>
            <strong>도구 모드: </strong>
            <label><input type="radio" name="toolMode" value="draw" checked> 🖌️ 그리기</label>
            <label><input type="radio" name="toolMode" value="pipe"> 🚰 파이프 설치</label>
            <label><input type="radio" name="toolMode" value="erasePipe"> ❌ 파이프 삭제</label>
        </div>
        <div style="border-left: 1px solid #555; height: 30px;"></div>
        <div>
            <strong>파이프 유량 (Flow Rate): </strong>
            <input type="range" id="flowRate" min="0.05" max="1.0" step="0.05" value="0.5">
            <span id="flowRateVal" style="display:inline-block; width:40px; color:#4CAF50; font-weight:bold;">50%</span>
        </div>
    </div>

    <!-- 물질 선택창 (Toolbar) -->
    <div class="controls" id="toolbar"></div>

    <!-- 화학 반응 설정 패널 -->
    <div class="panel" style="flex-direction: column; align-items: flex-start; max-width: 800px; margin-top: 15px;">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0; color: #ffeb3b;">🧪 화학 반응 및 열역학 설정</h3>
            <div style="display: flex; gap: 15px;">
                <label style="color: #ff9800; font-weight: bold; cursor: pointer;">
                    <input type="checkbox" id="strict-oxygen-toggle" checked> 엄격한 산소 요구 (Strict O2)
                </label>
                <label style="color: #4CAF50; font-weight: bold; cursor: pointer;">
                    <input type="checkbox" id="ambient-cooling-toggle" checked> 자연 냉각 허용 (Ambient Cooling)
                </label>
            </div>
        </div>
        <div id="reactions-container" style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
            <!-- Reactions will be injected here by JS -->
        </div>
    </div>

    <script src="main.js?v=2"></script>
</body>
</html>
